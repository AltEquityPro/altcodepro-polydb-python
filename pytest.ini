[pytest]
# ─── polydb integration test suite ───────────────────────────────────────────
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions= test_*

# Default markers (documented in conftest.py)
markers =
    postgresql:    PostgreSQL adapter tests
    mongodb:       MongoDB adapter tests
    azure:         Azure (Azurite) adapter tests
    aws:           AWS (LocalStack) adapter tests
    gcp:           GCP emulator adapter tests
    vercel:        Vercel KV (Redis) adapter tests
    multi_engine:  Multi-engine routing tests
    slow:          Slow tests (excluded by default; pass --run-slow)

# Show 20 slowest tests, short tracebacks by default
addopts =
    -v
    --tb=short
    --durations=20

# Treat unraisable exceptions in threads as failures
filterwarnings =
    error::pytest.PytestUnraisableExceptionWarning